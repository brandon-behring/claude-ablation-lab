# claude5-refresh — the release-tracking grid (first used 2026-07-06, audit).
#
# Purpose: re-run the SAME cheap probe (t8 hard-math) each model generation and
# watch the cost/latency/token frontier move. t8 is documented saturated for the
# big models (2026-07-04 pressure test), so this grid tracks the COST axes, not
# big-model quality movement — haiku slippage is the only expected quality signal.
# It also directly tests Anthropic's claim that lower effort on Fable 5 rivals
# prior models at xhigh, on the cost/latency side.
#
# The CLI *accepts* every alias×effort pair (re-probed live 2026-07-06 on CLI 2.1.201,
# 20/20 minimal cells `ok`), but acceptance ≠ application. Haiku 4.5 has NO effort
# parameter (CV2), so its efforts are inert duplicates — the provider capability matrix
# collapses haiku to ONE canonical cell (pinned to `low` below to make it explicit).
# `medium` is dropped for budget (least informative tier); `max` is kept on fable only —
# already measured waste at n=5 for sonnet/opus (pressure test).
#
# sonnet × {low,high,xhigh} + opus × {low,high,xhigh} + fable × {low,high,xhigh,max}
# + haiku × {low} = 11 configs × 3 epochs = 33 cells. NOTE: the committed 39-row release
# snapshot (results/claude5-refresh-2026-07-06.jsonl) predates this matrix — its 3
# haiku-effort rows are one config; it stays valid as a dated release history.
# `ablation estimate` before any run; resumable ledger at results/claude5-refresh.jsonl.
models: [haiku, sonnet, opus, claude-fable-5]
efforts: [low, high, xhigh, max]
variants: [none]
epochs: 3

effort_support:
  haiku: [low]
  sonnet: [low, high, xhigh]
  opus: [low, high, xhigh]
  claude-fable-5: [low, high, xhigh, max]
