# Tiny smoke grid: haiku + sonnet × {low, high} × 1 epoch in a neutral cwd. Haiku 4.5
# has no effort parameter (CV2), so the capability matrix collapses it to one canonical
# cell → 3 cells (haiku/low, sonnet/low, sonnet/high). Pair with a self-contained task to
# prove the loop end-to-end cheaply, e.g.:
#   ablation run tasks grids/smoke.yaml --task t3_verbatim_anchor
models: [haiku, sonnet]
efforts: [low, high]
variants: [none]
epochs: 1
effort_support:
  haiku: [low]
  sonnet: [low, high]
