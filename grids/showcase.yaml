# Public showcase grid (Phase C) — self-contained, leak-safe tasks only.
#   t3_verbatim_anchor  → variant `none` (infra-agnostic)
#   t4_demo_infra       → the two demo-infra refs (run examples/demo-infra/setup.sh first)
# T1/T2 are intentionally excluded: T1 needs the prompt-injection holdout, T2 needs the
# private research_toolkit. This grid stays cheap and reproducible by any reader.
#
# T4 gives exactly 4 matched (model, effort) configs under both refs — the floor
# `compare` needs (MIN_PAIRS_FOR_REAL) to return a real verdict.
models: [haiku, sonnet]
efforts: [low, high]
variants:
  - none
  - .demo-infra@without-skill
  - .demo-infra@with-skill
epochs: 3
effort_support:
  haiku: [low, high]
  sonnet: [low, high]
