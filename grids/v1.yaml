# v1 focused sweep: 3 models × {low, high, max} × 3 epochs.
#
# Variants:
#   - "none"  → neutral cwd; the infra-agnostic tasks (T1 classification, T3
#               anchor) run here.
#   - a "<repo>@<ref>" worktree variant for the infra-sensitive T2 (/research-plan).
#     Point it at a git checkout where the /research-plan skill + research CLAUDE.md
#     load. NOTE (2026-07-01 probe): skills load ONLY from the
#     .claude/skills/<name>/SKILL.md directory form — research_toolkit's flat
#     .claude/skills/*.md files do NOT load, so convert them (or add
#     .claude/commands/research-plan.md) BEFORE running T2, or its agentic cells run
#     and score 0 for infra reasons. If the path is not a worktree-able git repo,
#     the orchestrator logs it and skips those T2 cells.
models: [haiku, sonnet, opus]
efforts: [low, high, max]
variants:
  - none
  - ~/Claude/research_toolkit@HEAD
epochs: 3

# Per-grid effort narrowing, on top of the provider capability matrix. `max` effort is
# Opus-only here. Haiku 4.5 has NO effort parameter (CV2), so it is pinned to one
# canonical cell — the capability matrix collapses it regardless; this just makes the
# intent explicit. A model omitted here supports every effort in `efforts`.
effort_support:
  haiku: [low]
  sonnet: [low, high]
  opus: [low, high, max]
