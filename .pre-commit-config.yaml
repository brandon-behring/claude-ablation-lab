# Pre-commit hooks. Install both stages once with `make hooks`:
#   pre-commit install                       # ruff + black at commit
#   pre-commit install --hook-type pre-push  # mypy at push
# CI's own ruff/black/mypy steps remain the source of truth; drift surfaces as CI failure.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
        language_version: python3.13
        args: [--line-length=100]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, src)
        entry: python -m mypy src
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
