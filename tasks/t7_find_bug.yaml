# T7 — find-the-injected-bug, MULTI-ITEM (single-turn reasoning probe; pressure-test).
# Hardened from the v1 single-bug design, which SATURATED (every config ~solved it) and
# whose binary 0/1 score was too coarse + too fragile to grade. Now SIX numbered
# functions, each with exactly one seeded bug spanning easy -> subtle; the model names
# the buggy line of each. Graded by `exact_match_set` = fraction found (a smooth k/6
# score that discriminates at low n, and — after the v1 grader confound — robust to
# verbose prose via the `ANSWER k:` contract).
#
# Bugs (unambiguous, one per function): 1 range(1,n) drops n; 2 `<` finds the min;
# 3 `//` truncates a float mean; 4 `+1` off-by-one drops one element; 5 result[i] is
# out of range (should be result[i-1]); 6 type-7 rank q*n should be q*(n-1).
id: t7_find_bug
domain: debugging
grader: exact_match_set
mode: single
infra_repo: null
timeout_s: 300
tags: [reasoning, single-turn, debugging, pressure-test, multi-item]
params:
  source_text: |
    # Function 1
    def sum_to_n(n):
        """Sum of the integers 1..n inclusive."""
        total = 0
        for i in range(1, n):
            total += i
        return total

    # Function 2
    def maximum(xs):
        """Return the largest element of a non-empty list."""
        best = xs[0]
        for x in xs:
            if x < best:
                best = x
        return best

    # Function 3
    def average(xs):
        """Arithmetic mean of a non-empty list of numbers, as a float."""
        return sum(xs) // len(xs)

    # Function 4
    def last_k(xs, k):
        """Return the last k elements of xs, in their original order."""
        return xs[len(xs) - k + 1:]

    # Function 5
    def running_max(xs):
        """Return a list where output[i] = max(xs[0..i]), the max of the prefix ending at i."""
        result = [xs[0]]
        for i in range(1, len(xs)):
            result.append(max(result[i], xs[i]))
        return result

    # Function 6
    def quantile(sorted_values, q):
        """The q-th quantile (0 <= q <= 1) via type-7 linear interpolation (numpy's default)."""
        n = len(sorted_values)
        rank = q * n
        lo = int(rank)
        hi = min(lo + 1, n - 1)
        weight = rank - lo
        return sorted_values[lo] * (1.0 - weight) + sorted_values[hi] * weight
gold:
  expected:
    - "for i in range(1, n):"
    - "if x < best:"
    - "return sum(xs) // len(xs)"
    - "return xs[len(xs) - k + 1:]"
    - "result.append(max(result[i], xs[i]))"
    - "rank = q * n"
prompt: |
  Below are SIX numbered Python functions. Each contains EXACTLY ONE bug — a single
  line that makes it return incorrect results or crash for some valid input. For every
  function, identify that one buggy line.

  Reason as needed, then finish with exactly one line per function, in this format:
    ANSWER 1: <the buggy line of Function 1, copied verbatim>
    ANSWER 2: <the buggy line of Function 2>
    ... through ANSWER 6.
  Each answer must be a single line copied from that function — nothing else.

  FUNCTIONS:
  {source_text}
