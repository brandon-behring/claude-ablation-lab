name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - name: Ruff check
        run: ruff check src/ tests/
      - name: Black check
        run: black --check src/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e ".[dev]"
      - name: Mypy
        run: mypy src/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      # eval-toolkit (graders/stats dep) is not on PyPI; clone the sibling repo for
      # the eval-toolkit-dependent tests. Tests that need it are marked and skip if absent.
      - name: Install eval-toolkit (best-effort)
        run: pip install "git+https://github.com/brandon-behring/eval-toolkit.git" || echo "eval-toolkit unavailable; dependent tests will skip"
      - run: pip install -e ".[dev]"
      - name: Pytest
        run: pytest --cov=claude_ablation_lab --cov-report=term-missing --cov-fail-under=90

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks (secret scan of history)
        run: |
          VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" | tar -xz gitleaks
          ./gitleaks git . --no-banner
